<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User page</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- ВЕРХНЯЯ ПАНЕЛЬ -->
<nav class="navbar navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container-fluid px-4">
        <span class="navbar-brand">
            <strong id="header-email">Loading...</strong>
            <span> with roles: </span>
            <span id="header-roles"></span>
        </span>
        <form action="/logout" method="POST" class="d-inline">
            <button type="submit" class="btn btn-link text-secondary text-decoration-none p-0">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid mt-3">
    <div class="row">
        <!-- БОКОВОЕ МЕНЮ -->
        <div class="col-md-2 px-0 pt-3">
            <div class="nav flex-column nav-pills">
                <!-- Ссылка видна только админу через Thymeleaf Security -->
                <a sec:authorize="hasRole('ADMIN')" class="nav-link" href="/admin">Admin</a>
                <a class="nav-link active" href="#">User</a>
            </div>
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div class="col-md-10 px-4 pb-5">
            <h1 class="mb-3">User information-page</h1>

            <div class="card shadow-sm">
                <div class="card-header bg-light">
                    <h5 class="mb-0">About user</h5>
                </div>
                <div class="card-body p-4">
                    <table class="table table-striped align-middle">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                        </thead>
                        <tbody id="user-info-table">
                        <!-- Данные вставит user.js -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com"></script>
<script src="/js/bootstrap.bundle.min.js"></script>
<!-- Подключаем наш скрипт -->
<script src="/js/user.js"></script>
</body>
</html>
