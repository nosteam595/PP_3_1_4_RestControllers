<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Шапка -->
<nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container-fluid px-4">
        <span class="navbar-brand">
            <strong id="header-email"></strong> with roles: <span id="header-roles"></span>
        </span>
        <form action="/logout" method="POST" class="d-inline">
            <button type="submit" class="btn btn-link text-secondary text-decoration-none p-0">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid mt-3">
    <div class="row">
        <!-- Левое меню -->
        <div class="col-md-2 px-0 pt-3">
            <div class="nav flex-column nav-pills">
                <a class="nav-link active" href="#">Admin</a>
                <a class="nav-link" href="/users/user/details">User</a>
            </div>
        </div>

        <!-- Контент -->
        <div class="col-md-10 px-4">
            <h1 class="mb-3">Admin panel</h1>
            <ul class="nav nav-tabs" id="adminTabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="table-tab" data-bs-toggle="tab" data-bs-target="#usersTablePane" type="button" role="tab">Users table</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="new-user-tab" data-bs-toggle="tab" data-bs-target="#newUserPane" type="button" role="tab">New User</button>
                </li>
            </ul>

            <div class="tab-content border bg-white shadow-sm">
                <!-- 1. Вкладка ТАБЛИЦА -->
                <div class="tab-pane fade show active" id="usersTablePane" role="tabpanel">
                    <div class="p-3 bg-light border-bottom"><h5>All users</h5></div>
                    <div class="p-4">
                        <table class="table table-striped align-middle">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Edit</th>
                                <th>Delete</th>
                            </tr>
                            </thead>
                            <tbody id="all-users-table"></tbody>
                        </table>
                    </div>
                </div>

                <!-- 2. Вкладка НОВЫЙ ПОЛЬЗОВАТЕЛЬ -->
                <div class="tab-pane fade" id="newUserPane" role="tabpanel">
                    <div class="p-3 bg-light border-bottom"><h5>Add new user</h5></div>
                    <div class="p-4 d-flex justify-content-center">
                        <form id="add-user-form" class="col-md-4 text-center fw-bold">
                            <label class="form-label mt-2">First name</label>
                            <input type="text" id="add-firstname" class="form-control" required>

                            <label class="form-label mt-2">Last name</label>
                            <input type="text" id="add-lastname" class="form-control" required>

                            <label class="form-label mt-2">Age</label>
                            <input type="number" id="add-age" class="form-control" required>

                            <label class="form-label mt-2">Email</label>
                            <input type="email" id="add-email" class="form-control" required>

                            <label class="form-label mt-2">Password</label>
                            <input type="password" id="add-password" class="form-control" required>

                            <label class="form-label mt-2">Role</label>
                            <select id="add-roles" class="form-select" multiple size="2" required></select>

                            <button type="submit" class="btn btn-success mt-4">Add new user</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- МОДАЛКА EDIT -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="edit-user-form">
                <div class="modal-body text-center fw-bold d-flex justify-content-center">
                    <div class="col-md-8">
                        <label>ID</label>
                        <input type="text" id="edit-id" class="form-control bg-light" readonly>

                        <label class="mt-2">First name</label>
                        <input type="text" id="edit-firstname" class="form-control">

                        <label class="mt-2">Last name</label>
                        <input type="text" id="edit-lastname" class="form-control">

                        <label class="mt-2">Age</label>
                        <input type="number" id="edit-age" class="form-control">

                        <label class="mt-2">Email</label>
                        <input type="email" id="edit-email" class="form-control">

                        <label class="mt-2">Password</label>
                        <input type="password" id="edit-password" class="form-control">

                        <label class="mt-2">Role</label>
                        <select id="edit-roles" class="form-select" multiple size="2"></select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Edit</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- МОДАЛКА DELETE -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="delete-user-form">
                <div class="modal-body text-center fw-bold d-flex justify-content-center">
                    <div class="col-md-8">
                        <label>ID</label>
                        <input type="text" id="delete-id" class="form-control bg-light" readonly>

                        <label class="mt-2">First name</label>
                        <input type="text" id="delete-firstname" class="form-control bg-light" readonly>

                        <label class="mt-2">Last name</label>
                        <input type="text" id="delete-lastname" class="form-control bg-light" readonly>

                        <label class="mt-2">Age</label>
                        <input type="number" id="delete-age" class="form-control bg-light" readonly>

                        <label class="mt-2">Email</label>
                        <input type="email" id="delete-email" class="form-control bg-light" readonly>

                        <label class="mt-2">Role</label>
                        <select id="delete-roles" class="form-select" multiple size="2" disabled></select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-danger">Delete</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
