<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <!-- Используем ваш локальный Bootstrap -->
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- ВЕРХНЯЯ ПАНЕЛЬ -->
<nav class="navbar navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand">
            <!-- Достаем имя напрямую из контекста безопасности -->
            <strong th:text="${#authentication.name}">admin@mail.ru</strong>
            <span class="text-secondary"> with roles: </span>
            <span class="text-secondary" th:each="authority : ${#authentication.authorities}"
                  th:text="${authority.authority.replace('ROLE_', '') + ' '}"></span>
        </span>
        <form th:action="@{/logout}" method="POST">
            <button type="submit" class="btn btn-link text-secondary text-decoration-none p-0">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid mt-3">
    <div class="row">

        <!-- ЛЕВОЕ МЕНЮ -->
        <div class="col-md-2 px-0">
            <div class="nav flex-column nav-pills" role="tablist">
                <a class="nav-link active" href="#">Admin</a>
                <a class="nav-link" th:href="@{/users/user/details}">User</a>
            </div>
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div class="col-md-10 px-4">
            <h1 class="mb-3">Admin panel</h1>

            <!-- ВКЛАДКИ -->
            <ul class="nav nav-tabs" role="tablist">
                <li class="nav-item">
                    <a class="nav-link active" data-bs-toggle="tab" href="#usersTable" role="tab">Users table</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/users/add}">New User</a>
                </li>
            </ul>

            <!-- КОНТЕНТ ВКЛАДКИ -->
            <div class="tab-content">
                <div class="tab-pane fade show active border border-top-0 bg-white" id="usersTable">

                    <!-- Заголовок карточки как на скрине -->
                    <div class="p-3 bg-light border-bottom">
                        <h5 class="mb-0">All users</h5>
                    </div>

                    <!-- Тело с таблицей -->
                    <div class="p-4">
                        <table class="table table-striped align-middle">
                            <thead class="border-top">
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Edit</th>
                                <th>Delete</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}">2</td>
                                <td th:text="${user.firstName}">admin</td>
                                <td th:text="${user.lastName}">admin</td>
                                <td th:text="${user.age}">35</td>
                                <td th:text="${user.email}">admin@mail.ru</td>
                                <td>
                                        <span th:each="role : ${user.roles}"
                                              th:text="${role.name.replace('ROLE_', '') + ' '}"></span>
                                </td>
                                <td>
                                    <!-- Кнопка Edit (бирюзовая) -->
                                    <a th:href="@{/users/edit(id=${user.id})}"
                                       class="btn btn-info btn-sm text-white px-3"
                                       style="background-color: #17a2b8; border-color: #17a2b8;">Edit</a>
                                </td>
                                <td>
                                    <!-- Кнопка Delete (красная) -->
                                    <form th:action="@{/users/remove}" method="POST" class="d-inline">
                                        <input type="hidden" name="id" th:value="${user.id}" />
                                        <button type="submit" class="btn btn-danger btn-sm px-2"
                                                onclick="return confirm('Вы уверены?')">Delete</button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Чтобы вкладки переключались, не забудьте подключить JS -->
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
