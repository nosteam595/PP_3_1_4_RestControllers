<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Шапка (заполнится через JS) -->
<nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container-fluid px-4">
        <span class="navbar-brand">
            <strong id="header-email"></strong> with roles: <span id="header-roles"></span>
        </span>
        <a href="/logout" class="text-secondary text-decoration-none">Logout</a>
    </div>
</nav>

<div class="container-fluid mt-3">
    <div class="row">
        <!-- Левое меню (статично) -->
        <div class="col-md-2 px-0 pt-3">
            <div class="nav flex-column nav-pills">
                <a class="nav-link active" href="#">Admin</a>
                <a class="nav-link" href="/user">User</a>
            </div>
        </div>

        <!-- Контент -->
        <div class="col-md-10 px-4">
            <h1>Admin panel</h1>
            <ul class="nav nav-tabs" id="adminTabs">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#usersTablePane">Users table</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#newUserPane">New User</button>
                </li>
            </ul>

            <div class="tab-content border bg-white">
                <!-- Вкладка ТАБЛИЦА -->
                <div class="tab-pane fade show active" id="usersTablePane">
                    <div class="p-3 bg-light border-bottom"><h5>All users</h5></div>
                    <div class="p-4">
                        <table class="table table-striped">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Edit</th>
                                <th>Delete</th>
                            </tr>
                            </thead>
                            <tbody id="all-users-table"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Вкладка НОВЫЙ ПОЛЬЗОВАТЕЛЬ (Форма создания) -->
                <div class="tab-pane fade" id="newUserPane">
                    <!-- Здесь форма с id="add-user-form" -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ОДНА МОДАЛКА EDIT -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="edit-user-form">
                <div class="modal-body text-center fw-bold">
                    <div class="col-md-8 mx-auto">
                        <label>ID</label>
                        <input type="text" id="edit-id" class="form-control" readonly>
                        <label>First name</label>
                        <input type="text" id="edit-firstname" class="form-control">
                        <!-- ... остальные поля ... -->
                        <label>Role</label>
                        <select id="edit-roles" class="form-select" multiple size="2"></select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Edit</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ОДНА МОДАЛКА DELETE (аналогично Edit, но поля readonly) -->

<script src="/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script> <!-- Весь ваш Fetch JS здесь -->
</body>
</html>
